<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pokémon List</title>
</head>
<body>
    <h1>Pokémon in Database</h1>
    <a href="{{ url_for('add_pokemon') }}">➕ Add Pokémon</a>
    <ul>
    {% for c in creatures %}
        <li>
            <strong>#{{ c.id }} {{ c.name }}</strong><br>
            Height: {{ c.height }} | Weight: {{ c.weight }}<br>
            Types: {{ c.types }}<br>
            <a href="{{ url_for('edit_pokemon', id=c.id) }}">Edit</a>
            <form method="POST" action="{{ url_for('delete_pokemon', id=c.id) }}" style="display:inline;">
                <button type="submit" onclick="return confirm('Delete {{ c.name }}?')">Delete</button>
            </form>
        </li>
    {% else %}
        <li>No Pokémon yet.</li>
    {% endfor %}
    </ul>
</body>
</html>
