<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Pokémon</title>
</head>
<body>
    <h1>Add a new Pokémon</h1>
    <form method="POST">
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}
        <label>Pokémon id or name:</label>
        <input type="text" name="name" required>
        <button type="submit">Save</button>
    </form>
    <a href="{{ url_for('index') }}">Back</a>
</body>
</html>
